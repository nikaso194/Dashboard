<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDC Dashboard</title>
<style>
  :root {
    --bg-main: #060b16;
    --bg-panel: #0a1220;
    --border-subtle: #16233a;
    --cyan: #22d3ee;
    --text-primary: #eaf2ff;
    --text-muted: #7f93b3;
    --red: #e23f4f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(34,211,238,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(99,102,241,0.05), transparent 45%);
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: linear-gradient(180deg, #0b1424 0%, #08111f 100%);
    border-bottom: 1px solid var(--border-subtle);
    box-shadow: 0 1px 0 rgba(34,211,238,0.15);
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 18px;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: var(--cyan);
    text-shadow: 0 0 18px rgba(34,211,238,0.55);
    white-space: nowrap;
  }

  .brand .divider {
    width: 1px;
    height: 26px;
    background: linear-gradient(180deg, transparent, var(--cyan), transparent);
    opacity: 0.7;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .date-field, .search-field {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0c1626;
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text-primary);
    font-size: 0.9rem;
    min-width: 200px;
  }

  .search-field {
    min-width: 260px;
    color: var(--text-muted);
  }

  .date-field svg { flex-shrink: 0; color: var(--cyan); }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .logout-btn:hover {
    background: rgba(226,63,79,0.1);
    box-shadow: 0 0 14px rgba(226,63,79,0.35);
  }

  /* ---------- Main grid ---------- */
  main {
    padding: 36px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  @media (max-width: 1100px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 620px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
  }

  /* ---------- Card ---------- */
  /* The card is just a frame that holds the FULL pre-made image
     (border, icon, arrow, glow are already baked into the image
     itself). We never crop it — object-fit: contain guarantees
     the whole image, including its border, is always visible. */
  .card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    aspect-ratio: 16 / 9;   /* adjust this if your images have a different shape */
    border: none;
    border-radius: 16px;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    background: #060b16;   /* matches page background so no crop = no visible letterboxing */
    transition: transform 0.25s ease, filter 0.25s ease;
    outline: none;
  }

  .card:hover,
  .card:focus-visible {
    transform: translateY(-4px);
    filter: brightness(1.08);
  }

  .card:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 3px;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* <-- key fix: never crops, always shows full border */
    display: block;
  }

  /* Placeholder shown until a matching image file is found. */
  .card .placeholder-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-align: center;
    padding: 16px;
    font-size: 0.85rem;
    color: var(--text-muted);
    border: 1px dashed var(--border-subtle);
    border-radius: 16px;
    background: #0c1626;
    pointer-events: none;
  }

  .card .placeholder-label .name {
    color: var(--text-primary);
    font-weight: 600;
  }

  .card .placeholder-label .tried {
    font-size: 0.72rem;
    color: #55688a;
    word-break: break-all;
    max-width: 90%;
  }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    TDC&nbsp;DASHBOARD
    <span class="divider"></span>
  </div>

  <div class="header-controls">
    <div class="date-field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <span id="current-date">22-June-2026</span>
    </div>

    <div class="search-field">
      <input type="text" placeholder="Search..." style="background:transparent;border:none;outline:none;color:inherit;font-size:0.9rem;width:100%;" />
    </div>

    <button class="logout-btn">Log Out</button>
  </div>
</header>

<main>
  <div class="grid">

    <a class="card" href="#journal" aria-label="Journal" data-name="Journal"
       data-candidates="journal.PNG,journal.png,Journal.PNG,Journal.png,journal.jpg,journal.jpeg">
      <img alt="Journal">
      <div class="placeholder-label"><span class="name">Journal</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#backend" aria-label="Backend" data-name="Backend"
       data-candidates="backend.PNG,backend.png,Backend.PNG,Backend.png,backend.jpg,backend.jpeg">
      <img alt="Backend">
      <div class="placeholder-label"><span class="name">Backend</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#intrada-fxp" aria-label="Intrada-FXP" data-name="Intrada-FXP"
       data-candidates="trade.PNG,trade.png,Trade.PNG,Trade.png,trade.jpg,trade.jpeg">
      <img alt="Intrada-FXP">
      <div class="placeholder-label"><span class="name">Intrada-FXP</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#history-fxp" aria-label="History FXP" data-name="History FXP"
       data-candidates="tax.PNG,tax.png,Tax.PNG,Tax.png,tax.jpg,tax.jpeg">
      <img alt="History FXP">
      <div class="placeholder-label"><span class="name">History FXP</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#history-backend" aria-label="History Backend" data-name="History Backend"
       data-candidates="historybu.PNG,historybu.png,Historybu.PNG,HistoryBu.png,historybu.jpg,historybu.jpeg">
      <img alt="History Backend">
      <div class="placeholder-label"><span class="name">History Backend</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#history-journal" aria-label="History Journal" data-name="History Journal"
       data-candidates="historyjn.PNG,historyjn.png,Historyjn.PNG,HistoryJn.png,historyjn.jpg,historyjn.jpeg">
      <img alt="History Journal">
      <div class="placeholder-label"><span class="name">History Journal</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#faqs" aria-label="FAQs" data-name="FAQs"
       data-candidates="faq.PNG,faq.png,Faq.PNG,FAQ.png,faq.jpg,faq.jpeg">
      <img alt="FAQs">
      <div class="placeholder-label"><span class="name">FAQs</span><span class="tried"></span></div>
    </a>

    <a class="card" href="#top-clients" aria-label="Top Clients" data-name="Top Clients"
       data-candidates="topcl.PNG,topcl.png,Topcl.PNG,TopCl.png,topcl.jpg,topcl.jpeg">
      <img alt="Top Clients">
      <div class="placeholder-label"><span class="name">Top Clients</span><span class="tried"></span></div>
    </a>

  </div>
</main>

<footer>TDC Dashboard</footer>

<script>
  document.querySelectorAll('.card').forEach(function (card) {
    const img = card.querySelector('img');
    const label = card.querySelector('.placeholder-label .tried');
    const candidates = card.dataset.candidates.split(',').map(function (s) { return s.trim(); });
    let i = 0;
    const attempted = [];

    function tryNext() {
      if (i >= candidates.length) {
        img.style.display = 'none';
        if (label) {
          label.textContent = 'Tried: ' + attempted.join(', ');
        }
        return;
      }
      const file = candidates[i++];
      attempted.push(file);
      img.onerror = tryNext;
      img.onload = function () {
        card.querySelector('.placeholder-label').style.display = 'none';
        img.style.display = 'block';
      };
      img.src = file;
    }

    tryNext();
  });
</script>

</body>
</html>
